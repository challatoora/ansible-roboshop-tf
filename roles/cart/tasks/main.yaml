- name: app setup
  ansible.builtin.import_role:
    name: common 
    tasks_from: appsetup.yaml

- name: nodejs installation
  ansible.builtin.import_role:
    name: common 
    tasks_from: nodejs.yaml

- name: service system installation
  ansible.builtin.import_role:
    name: common 
    tasks_from: systemd.yaml

- name: cart stared 
  ansible.builtin.service:
    name: cart
    state: restarted
    enabled: yes