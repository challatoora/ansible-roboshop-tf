- name: app setup
  ansible.builtin.import_role:
    name: common 
    tasks_from: appsetup.yaml

- name: python setup
  ansible.builtin.import_role:
    name: common 
    tasks_from: pythonsetup.yaml


- name: service system installation
  ansible.builtin.import_role:
    name: common 
    tasks_from: systemd.yaml


- name: restart payment
  ansible.builtin.service:
    name: payment
    state: restarted
    enabled: yes