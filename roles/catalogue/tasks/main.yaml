- name: app setup
  ansible.builtin.import_role:
    name: common 
    tasks_from: appsetup.yaml

- name: nodejs installation
  ansible.builtin.import_role:
    name: common 
    tasks_from: nodejs.yaml

- name: service system installation
  ansible.builtin.import_role:
    name: common 
    tasks_from: systemd.yaml

- name: copying mongodb
  ansible.builtin.copy:
    src: mongo.repo
    dest: /etc/yum.repos.d/mongo.repo  

- name  : install install mongodb-mongosh 
  ansible.builtin.package:
    name: mongodb-mongosh 
    state: present 

- name : loaded
  ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
  register: catalogue_output

- name: loadading the data into db
  ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
  when: catalogue_output.stdout | int < 0

- name: catalogue stared 
  ansible.builtin.service:
    name: catalogue
    state: restarted
    enabled: yes