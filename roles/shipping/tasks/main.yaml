- name: app setup
  ansible.builtin.import_role:
    name: common 
    tasks_from: appsetup.yaml

- name: java setup
  ansible.builtin.import_role:
    name: common 
    tasks_from: javasetup.yaml


- name: service system installation
  ansible.builtin.import_role:
    name: common 
    tasks_from: systemd.yaml


- name: install python dependencie
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
  - cryptography
  - PyMySQL

- name: import shipping data
  community.mysql.mysql_db:
    state: import
    name: all
    login_host: mysql-dev.mreddy.online
    login_user: root
    login_password: RoboShop@1
    target: "{{ item }}"
  loop:
  - /app/db/schema.sql
  - /app/db/app-user.sql 
  - /app/db/master-data.sql

- name: start and enable shipping
  ansible.builtin.service:
    name: shipping
    state: restarted
    enabled: yes