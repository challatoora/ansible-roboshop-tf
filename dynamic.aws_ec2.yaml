plugin: amazon.aws.aws_ec2
regions:
- us-east-1
hostnames:
  # This option allows displaying the public ip addresses.
  #- ip-address
  # This option allows displaying the private ip addresses.
  - private-ip-address
filters:
  instance-state-name : running
  tag:Name: shell
compose:
  ansible_host: private_ip_address
keyed_groups:
- separator: ''
  key: tags.component